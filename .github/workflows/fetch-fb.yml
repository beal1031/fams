name: Fetch Facebook data

on:
  schedule:
    - cron: "0 * * * *"    # every hour at :00
  workflow_dispatch:        # manual trigger from Actions tab

jobs:
  fetch:
    runs-on: ubuntu-latest
    environment: github-pages
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Fetch posts and photos from Graph API
        env:
          FB_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          FB_PAGE: "1126617727201165"
        run: |
          BASE="https://graph.facebook.com/v22.0"
          FIELDS_POSTS="id,message,created_time,full_picture,permalink_url,attachments{media_type,media,subattachments,url},reactions.summary(true),comments.summary(true),shares"
          FIELDS_PHOTOS="id,name,created_time,images,link,album"

          HTTP=$(curl -sL -o posts_raw.json -w "%{http_code}" \
            "$BASE/$FB_PAGE/posts?fields=$FIELDS_POSTS&limit=10&access_token=$FB_TOKEN")
          HTTP="${HTTP: -3}"
          if [ "$HTTP" != "200" ]; then
            echo "ERROR: posts fetch returned HTTP $HTTP"
            cat posts_raw.json
            exit 1
          fi

          HTTP=$(curl -sL -o photos_raw.json -w "%{http_code}" \
            "$BASE/$FB_PAGE/photos?type=uploaded&fields=$FIELDS_PHOTOS&limit=12&access_token=$FB_TOKEN")
          HTTP="${HTTP: -3}"
          if [ "$HTTP" != "200" ]; then
            echo "ERROR: photos fetch returned HTTP $HTTP"
            cat photos_raw.json
            exit 1
          fi

      - name: Process data with Python
        run: python3 process-fb-data.py

      - name: Commit fb-data.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fb-data.json
          if git diff --cached --quiet; then
            echo "No changes — skipping commit"
          else
            git commit -m "chore: update fb-data.json [skip ci]"
            git push
          fi
